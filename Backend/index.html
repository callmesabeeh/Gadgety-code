<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Project</title>
</head>
<body>
    <title>Project CRUD Interface</title>
    <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
    background: #121212;
    color: #eaeaea;
  }

  h1, h2 {
    color: #ffffff;
    margin-bottom: 20px;
  }

  hr {
    border: none;
    border-top: 1px solid #2e2e2e;
    margin: 30px 0;
  }

  .container {
    background: #1e1e1e;
    padding: 28px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    max-width: 900px;
    margin: auto;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #dcdcdc;
  }

  input,
  textarea,
  select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: #ffffff;
    font-size: 14px;
  }

  input::placeholder,
  textarea::placeholder {
    color: #999;
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: #4da3ff;
    box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.4);
  }

  button {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: #4da3ff;
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  button:hover {
    background: #2f8cff;
  }

  button.delete {
    background: #e14c4c;
  }

  button.delete:hover {
    background: #c73737;
  }

  #addCategoryBtn {
    margin-left: 10px;
  }

  .project-list {
    margin-top: 30px;
  }

  .project {
    background: #262626;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid #333;
  }

  .project strong {
    font-size: 16px;
    color: #ffffff;
  }

  .project em {
    display: block;
    margin: 6px 0;
    color: #b5b5b5;
  }

  .project img {
    max-width: 120px;
    max-height: 120px;
    border-radius: 6px;
    margin-top: 10px;
    margin-bottom: 10px;
    border: 1px solid #444;
  }

  .project button {
    margin-right: 8px;
    margin-top: 6px;
  }
</style>

    <div class="container">          
        <h1>Project CRUD Interface</h1>
        <form id="projectForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div class="form-group">
                <label for="price">Price</label>
                <input type="number" id="price" name="price" required>
            </div>
            <div class="form-group">
                <label for="discPrice">Discounted Price</label>
                <input type="number" id="discPrice" name="discPrice">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="earbuds">Earbuds</option>
                    <option value="cases">Cases</option>
                    <option value="charger">Charger</option>
                </select>
                <button type="button" id="addCategoryBtn">Add Category</button>
            </div>
            <div class="form-group">
                <label for="images">Images (select multiple)</label>
                <input type="file" id="images" name="images" multiple accept="image/*">
            </div>
            <button type="submit">Add Project</button>
        </form>

        <hr>
        <h2>All Projects</h2>
        <div id="projects" class="project-list"></div>
    </div>

    <script>
    // Helper to fetch and display all projects
    async function fetchProjects() {
        const res = await fetch(`https://api.cornermobile.com.pk/projects`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        });
        const projects = await res.json();
        const container = document.getElementById('projects');
        container.innerHTML = '';
        // Only display projects with a valid id
        projects.filter(project => project.id).forEach(project => {
            const div = document.createElement('div');
            div.className = 'project';
            div.innerHTML = `
                <strong>${project.title}</strong> <br>
                <em>${project.description}</em><br>
                Price: ${project.price} | Discount: ${project.discountedPrice || '-'}<br>
                <img src="${project.image}" alt="Main Image">
                <div>
                    <button onclick="editProject('${project.id}')">Edit</button>
                    <button class="delete" onclick="deleteProject('${project.id}')">Delete</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Add new or update project
    const projectForm = document.getElementById('projectForm');
    projectForm.onsubmit = async function(e) {
        e.preventDefault();
        const editId = projectForm.getAttribute('data-edit-id');
        if (editId) {
            // Update project
            const body = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                price: document.getElementById('price').value,
                discountedPrice: document.getElementById('discPrice').value,
                category: document.getElementById('category').value
            };
            const res = await fetch(`https://api.cornermobile.com.pk/projects/${editId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                alert('Project updated!');
                projectForm.reset();
                projectForm.removeAttribute('data-edit-id');
                projectForm.querySelector('button[type="submit"]').textContent = 'Add Project';
                fetchProjects();
            } else {
                alert('Error updating project');
            }
        } else {
            // Add new project
            const formData = new FormData(projectForm);
            formData.append('category', document.getElementById('category').value);
            const res = await fetch(`https://api.cornermobile.com.pk/upload`, {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                alert('Project added!');
                projectForm.reset();
                fetchProjects();
            } else {
                alert('Error adding project');
            }
        }
    };

    // Add category button logic
    document.getElementById('addCategoryBtn').onclick = function() {
        const newCat = prompt('Enter new category name:');
        if (newCat) {
            const select = document.getElementById('category');
            const option = document.createElement('option');
            option.value = newCat.toLowerCase();
            option.textContent = newCat;
            select.appendChild(option);
            select.value = newCat.toLowerCase();
        }
    };

    // Edit project (fetch and fill form)
    window.editProject = async function(id) {
        if (!id) return alert('Invalid project ID');
        const res = await fetch(`https://api.cornermobile.com.pk/projects/${id}`);
        if (!res.ok) return alert('Project not found');
        const project = await res.json();
        document.getElementById('title').value = project.title;
        document.getElementById('description').value = project.description;
        document.getElementById('price').value = project.price;
        document.getElementById('discPrice').value = project.discountedPrice || '';
        document.getElementById('category').value = project.category || '';
        document.getElementById('projectForm').setAttribute('data-edit-id', id);
        document.getElementById('projectForm').querySelector('button[type="submit"]').textContent = 'Update Project';
    };

    // Delete project
    window.deleteProject = async function(id) {
        if (!id) return alert('Invalid project ID');
        if (!confirm('Delete this project?')) return;
        const res = await fetch(`https://api.cornermobile.com.pk/projects/${id}`, { method: 'DELETE' });
        if (res.ok) {
            alert('Project deleted!');
            fetchProjects();
        } else {
            alert('Error deleting project');
        }
    };

    // Initial load
    fetchProjects();
    </script>
</body>
</html>
